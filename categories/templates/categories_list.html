{% extends "layout.html" %}

{% block content %}


<h2 class="mb-4 text-center">Categories</h2>

<div class="row">

    {% for category in categories %}

    <div class="col-md-4 mb-4">

        <div class="card shadow h-100">

            {% if category.image_small %}
            <img src="/media/categories/small/{{ category.image_small }}"
                 class="card-img-top"
                 alt="{{ category.name }}">
            {% endif %}

            <div class="card-body">

                <h5 class="card-title">
                    {{ category.name }}
                </h5>

                <p class="card-text">
                    {{ category.description }}
                </p>

            </div>

            <div class="card-footer text-center">

                <a href="/categories/{{ category.slug }}"
                   class="btn btn-primary">
                   View
                </a>

            </div>

        </div>

    </div>

    {% endfor %}

</div>
</div>
{% endblock %}
